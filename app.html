<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Finanzas - Sincronizado</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
background:white;
padding:24px;
border-radius:12px;
max-width:1200px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.top-bar{
position:absolute;
top:16px;
right:16px;
display:flex;
gap:8px;
}

.user-btn{
background:#3b82f6;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">
<button class="user-btn" id="authButton" onclick="handleAuth()">
👤 <span id="authButtonText">Iniciar sesión</span>
</button>
</div>

<h1>📊 Control de Finanzas 2026</h1>

<p>Gestiona tus ingresos y gastos.</p>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

import {
getFirestore
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBNTkw2BH2DqRH_zbytZE47OW2OCMoUUTw",

authDomain:"finanzas-2026-a6d48.firebaseapp.com",

projectId:"finanzas-2026-a6d48",

storageBucket:"finanzas-2026-a6d48.appspot.com",

messagingSenderId:"773280047631",

appId:"1:773280047631:web:e11d88546678c5a979b97a"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let currentUser=null;



window.handleAuth=function(){

if(currentUser){

signOut(auth);

}else{

const provider=new GoogleAuthProvider();

signInWithPopup(auth,provider);

}

};



/* -------- VERIFICACIÓN DE LOGIN -------- */

onAuthStateChanged(auth,(user)=>{

const authButtonText=document.getElementById("authButtonText");

if(!user){

/* SI NO HAY USUARIO → REGRESA AL INDEX */

window.location.href="index.html";

return;

}

/* USUARIO AUTENTICADO */

currentUser=user;

authButtonText.textContent=user.displayName || user.email || "Mi cuenta";

/* AQUÍ CARGA TU APP */

console.log("Usuario logueado:",user.email);

});

</script>

</body>
</html>
