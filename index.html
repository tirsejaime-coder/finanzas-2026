<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMENSSAVE - Panel</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#020617;
color:white;
}

/* BARRA SUPERIOR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#071126;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-weight:bold;
letter-spacing:2px;
}

.user-area{
display:flex;
align-items:center;
gap:10px;
}

.logout-btn{
background:#1e293b;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

/* CONTENIDO */

.container{
padding:40px;
}

.card{
background:#071126;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

</style>

</head>

<body>

<!-- BARRA SUPERIOR -->

<div class="topbar">

<div class="logo">
LUMENSSAVE
</div>

<div class="user-area">

<span id="username">Usuario</span>

<button class="logout-btn" onclick="logout()">
Cerrar sesión
</button>

</div>

</div>


<!-- CONTENIDO DE LA APP -->

<div class="container">

<div class="card">
<h2>Panel financiero</h2>
<p>Aquí va tu aplicación financiera.</p>
</div>

<div class="card">
<h3>Balance</h3>
<p>$12,480</p>
</div>

</div>


<script>

/* MOSTRAR USUARIO GUARDADO */

const savedUser = localStorage.getItem("username");

if(savedUser){
document.getElementById("username").textContent = savedUser;
}

/* CERRAR SESIÓN */

function logout(){

localStorage.clear();

window.location.href="index.html";

}

</script>

</body>
</html>
