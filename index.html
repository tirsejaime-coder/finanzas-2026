<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMENSSAVE</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

:root{
--bg:#020617;
--card:#071126;
--text:#e5eefc;
--muted:#9fb0c9;
}

body{
font-family:Arial,Helvetica,sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
color:var(--text);
background:
radial-gradient(circle at 50% 0%,rgba(0,160,255,0.18),transparent 28%),
linear-gradient(180deg,#030814 0%,#020617 100%);
}

.container{
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
background:rgba(10,18,38,0.9);
border-radius:26px;
padding:36px;
}

.logo-panel{
display:flex;
align-items:center;
justify-content:center;
}

.logo-img{
max-width:420px;
width:100%;
}

.badge{
display:inline-flex;
gap:8px;
padding:8px 14px;
border-radius:999px;
background:rgba(45,245,152,0.1);
color:#8effc8;
font-size:.8rem;
margin-bottom:16px;
}

.badge-dot{
width:8px;
height:8px;
background:#2df598;
border-radius:50%;
}

h1{
font-size:42px;
letter-spacing:4px;
margin-bottom:10px;
}

.save{
background:linear-gradient(90deg,#9afcff,#16f4c7);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
color:var(--muted);
margin-bottom:25px;
line-height:1.6;
}

/* DASHBOARD PREVIEW */

.dashboard-preview{
display:flex;
flex-direction:column;
gap:20px;
margin-bottom:25px;
}

.preview-card{
background:rgba(3,9,22,.9);
border-radius:16px;
padding:20px;
}

.balance span{
font-size:13px;
color:var(--muted);
}

.balance h2{
font-size:28px;
margin-top:4px;
}

/* BARRAS MENSUALES */

.bar-chart{
display:flex;
align-items:flex-end;
gap:6px;
height:90px;
margin-top:15px;
}

.bar{
flex:1;
background:linear-gradient(180deg,#16f4c7,#00eaff);
border-radius:4px;
}

.months{
display:flex;
justify-content:space-between;
font-size:11px;
margin-top:6px;
color:#9fb0c9;
}

/* PIE 3D */

.pie-wrapper{
display:flex;
align-items:center;
gap:20px;
}

.pie-chart{

width:90px;
height:90px;
border-radius:50%;

background:conic-gradient(
#16f4c7 0% 35%,
#00eaff 35% 60%,
#4f7cff 60% 80%,
#8892ff 80% 100%
);

box-shadow:
inset 0 6px 10px rgba(255,255,255,0.15),
inset 0 -10px 20px rgba(0,0,0,0.5),
0 6px 20px rgba(0,255,200,0.2);

}

.pie-legend{
display:flex;
flex-direction:column;
gap:6px;
font-size:13px;
color:#9fb0c9;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.food{background:#16f4c7;}
.transport{background:#00eaff;}
.services{background:#4f7cff;}
.other{background:#8892ff;}

.actions{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
border:none;
border-radius:999px;
padding:12px 20px;
font-weight:bold;
cursor:pointer;
}

.btn-primary{
background:linear-gradient(135deg,#19bfff,#16f4c7);
}

.btn-secondary{
background:#1e293b;
color:white;
}

.login-panel{
display:none;
margin-top:25px;
}

.login-panel input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<section class="container">

<div class="logo-panel">

<img src="lumenssave-logo.png" class="logo-img">

</div>

<div>

<div class="badge">
<span class="badge-dot"></span>
Plataforma de finanzas personales
</div>

<h1>LUMENS<span class="save">SAVE</span></h1>

<p class="subtitle">
Controla ingresos, gastos y metas de ahorro en un solo lugar.
</p>

<div class="dashboard-preview">

<div class="preview-card">

<div class="balance">
<span>Balance anual</span>
<h2>$12,480</h2>
</div>

<div class="bar-chart">

<div class="bar" style="height:40%"></div>
<div class="bar" style="height:60%"></div>
<div class="bar" style="height:50%"></div>
<div class="bar" style="height:70%"></div>
<div class="bar" style="height:80%"></div>
<div class="bar" style="height:65%"></div>
<div class="bar" style="height:90%"></div>
<div class="bar" style="height:75%"></div>
<div class="bar" style="height:85%"></div>
<div class="bar" style="height:95%"></div>
<div class="bar" style="height:70%"></div>
<div class="bar" style="height:88%"></div>

</div>

<div class="months">

<span>E</span>
<span>F</span>
<span>M</span>
<span>A</span>
<span>M</span>
<span>J</span>
<span>J</span>
<span>A</span>
<span>S</span>
<span>O</span>
<span>N</span>
<span>D</span>

</div>

</div>

<div class="preview-card">

<div class="pie-wrapper">

<div class="pie-chart"></div>

<div class="pie-legend">

<div><span class="dot food"></span> Alimentación</div>
<div><span class="dot transport"></span> Transporte</div>
<div><span class="dot services"></span> Servicios</div>
<div><span class="dot other"></span> Otros</div>

</div>

</div>

</div>

</div>

<div class="actions">

<button class="btn btn-primary" onclick="showLogin()">
Iniciar sesión
</button>

<button class="btn btn-primary" onclick="goRegister()">
Crear cuenta
</button>

<button class="btn btn-secondary" onclick="goFree()">
Usar versión Free
</button>

</div>

<div class="login-panel" id="loginPanel">

<h3>Iniciar sesión</h3>

<input type="email" placeholder="Correo electrónico">

<input type="password" placeholder="Contraseña">

<br><br>

<button class="btn btn-primary" onclick="goRegisterApp()">
Crear cuenta
</button>
</div>

<div class="login-panel" id="registerPanel">

<h3>Crear cuenta</h3>

<input type="text" placeholder="Nombre">

<input type="email" placeholder="Correo electrónico">

<input type="password" placeholder="Contraseña">

<br><br>

<button class="btn btn-primary" onclick="goPro()">
Crear cuenta
</button>

</div>

</div>

</section>

<script>

function showLogin(){

document.getElementById("loginPanel").style.display="block";
document.getElementById("registerPanel").style.display="none";

}

function showRegister(){

document.getElementById("registerPanel").style.display="block";
document.getElementById("loginPanel").style.display="none";

}

function goFree(){

window.location.href="panel-free.html";

}

function goPro(){
window.location.href="app.html";
  
}

function goRegisterApp(){

localStorage.clear();

window.location.href="app.html";

}
  
</script>

</body>
</html>
